name: Generate Snake

on:
  schedule: # Runs every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3   # updated version

      - name: Generate Snake
        uses: Platane/snk@master
        with:
          github_user_name: Rajaboopathy-P
          svg_out_path: dist/snake.svg   # correct parameter

      - name: Push Snake to output branch
        uses: crazy-max/ghaction-github-pages@v3   # updated version
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
